<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRate - Movie Ratings and Reviews</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <h1>CineRate</h1>
            <ul>
                <li><a href="#top10">Top 10</a></li>
                <li><a href="#catalog">Catalog</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section id="top10" class="section">
            <div class="section-header">
                <h2>Top 10 Highest-Rated</h2>
                <div class="cache-info">
                    Source: <span id="cache-badge" class="badge">-</span>
                    <button id="refresh-btn" onclick="CineRate.loadTop10()">Refresh</button>
                </div>
            </div>
            <div class="movie-grid" id="top10-grid">
                <p>Loading...</p>
            </div>
        </section>

        <section id="catalog" class="section">
            <h2>Full Catalog</h2>
            <div class="movie-grid" id="catalog-grid">
                <p>Loading...</p>
            </div>
        </section>
    </main>

    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <button class="close-btn" id="modal-close">&times;</button>
            <div id="modal-body">
                <!-- Movie details will be loaded here -->
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 CineRate</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
