<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CineRate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>CineRate</h1>
            <span class="brand-dots" aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
            <p class="tagline">Movie ratings &amp; reviews</p>
        </div>
        <nav class="primary-nav">
            <a href="#top10-section">Top 10</a>
            <a href="#catalog-section">Catalog</a>
            <a href="#review-section">Review</a>
        </nav>
    </header>

    <main>
        <section id="top10-section">
            <h2>Top 10</h2>
            <ol id="top10-list"></ol>
        </section>

        <section id="catalog-section">
            <h2>Catalog</h2>
            <p class="section-hint">Click a film to autofill its ID into the review form.</p>
            <ul id="catalog-list"></ul>
        </section>

        <section id="review-section">
            <h2>Submit a Review</h2>
            <form id="review-form" novalidate>
                <div class="field">
                    <label for="review-user-id">User ID</label>
                    <input type="text" id="review-user-id" name="user_id" placeholder="UUID" required>
                </div>

                <div class="field">
                    <label for="review-movie-id">Movie ID</label>
                    <input type="text" id="review-movie-id" name="movie_id" placeholder="UUID" required>
                </div>

                <div class="field">
                    <label>Rating</label>
                    <div class="rating-input" id="rating-input">
                        <button type="button" data-value="1" aria-label="1 star">&#9733;</button>
                        <button type="button" data-value="2" aria-label="2 stars">&#9733;</button>
                        <button type="button" data-value="3" aria-label="3 stars">&#9733;</button>
                        <button type="button" data-value="4" aria-label="4 stars">&#9733;</button>
                        <button type="button" data-value="5" aria-label="5 stars">&#9733;</button>
                        <button type="button" class="rating-clear" aria-label="Clear rating">Clear</button>
                        <input type="hidden" id="review-rating" name="rating" required>
                    </div>
                </div>

                <div class="field">
                    <label for="review-text">Review</label>
                    <textarea id="review-text" name="review_text" rows="4" placeholder="Optional"></textarea>
                </div>

                <button type="submit">Submit</button>
                <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
