<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CineRate — For You</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .foryou-container {
            max-width: 800px;
            margin: 2rem auto;
            background: rgba(28, 34, 40, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .foryou-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .foryou-header h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 0%, #00e054 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 1rem 0;
            font-weight: 900;
            letter-spacing: -0.02em;
            border: none;
            text-transform: none;
            padding: 0;
        }

        .foryou-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin: 0;
        }

        .question-block {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .question-block:nth-child(1) { animation-delay: 0.1s; }
        .question-block:nth-child(2) { animation-delay: 0.2s; }
        .question-block:nth-child(3) { animation-delay: 0.3s; }

        .question-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .question-title::before {
            content: "";
            display: block;
            width: 24px;
            height: 3px;
            background: var(--green);
            border-radius: 2px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }

        .option-card {
            cursor: pointer;
            position: relative;
        }

        .option-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .option-content {
            background: var(--surface);
            border: 2px solid var(--border-soft);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            min-height: 100px;
        }

        .option-card:hover .option-content {
            transform: translateY(-4px);
            border-color: rgba(0, 224, 84, 0.3);
            background: rgba(28, 34, 40, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .option-card input[type="radio"]:checked + .option-content {
            border-color: var(--green);
            background: rgba(0, 224, 84, 0.08);
            box-shadow: 0 8px 24px rgba(0, 224, 84, 0.15);
            transform: translateY(-4px) scale(1.02);
        }

        .option-content h4 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .option-content p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .glow-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--green) 0%, #00b343 100%);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 224, 84, 0.25);
            margin-top: 1rem;
            animation: fadeIn 0.5s ease-out 0.4s forwards;
            opacity: 0;
        }

        .glow-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 224, 84, 0.4);
            filter: brightness(1.1);
        }

        .glow-btn:active {
            transform: translateY(1px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Recommendations styling improvements */
        .recommendation-list {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .recommendation-card {
            display: flex;
            background: rgba(28, 34, 40, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        .recommendation-card:nth-child(1) { animation-delay: 0.1s; }
        .recommendation-card:nth-child(2) { animation-delay: 0.2s; }
        .recommendation-card:nth-child(3) { animation-delay: 0.3s; }

        .recommendation-card:hover {
            transform: translateX(8px);
            border-color: rgba(0, 224, 84, 0.4);
            background: rgba(40, 48, 56, 0.8);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .recommendation-poster {
            width: 140px;
            object-fit: cover;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .recommendation-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .recommendation-title {
            font-size: 1.4rem;
            margin: 0 0 0.5rem 0;
            font-weight: 800;
            color: var(--text);
        }

        .recommendation-genres {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--green);
            margin: 0 0 0.75rem 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .recommendation-synopsis {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #recommendations-container h3 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--text);
            background: linear-gradient(135deg, #fff 0%, #00e054 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border-soft);
            animation-delay: 0.5s;
        }
        .reset-btn:hover {
            border-color: var(--text);
            color: var(--text);
            background: rgba(255,255,255,0.05);
            box-shadow: none;
            filter: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <a href="index.html" class="brand-link">
                <h1>CineRate</h1>
            </a>
            <span class="brand-dots" aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
            <p class="tagline">Movie ratings &amp; reviews</p>
        </div>
        <nav class="primary-nav">
            <a href="index.html">Home</a>
            <a href="leaderboard.html">Top 10</a>
            <a href="mywatchlist.html" data-auth-user hidden>Watchlist</a>
            <a href="foryou.html" class="active">For You</a>
        </nav>
        <div class="auth-widget" id="auth-widget">
            <div class="auth-anon" data-auth-anon>
                <button type="button" class="auth-link" data-auth-open="login">Log in</button>
                <button type="button" class="auth-link auth-link-primary" data-auth-open="signup">Sign up</button>
            </div>
            <div class="auth-user" data-auth-user hidden>
                <button type="button" class="auth-username-link" data-open-settings><span class="auth-username">@<span data-auth-username></span></span></button>
                <button type="button" class="auth-link" data-auth-logout>Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div class="foryou-container">
            <div class="foryou-header">
                <h2>Find Your Next Obsession</h2>
                <p>Answer 3 quick questions to get personalized movie matches curated just for you.</p>
            </div>

            <form id="foryou-form" class="foryou-form">
                <!-- Q1 -->
                <div class="question-block">
                    <h3 class="question-title">1. How do you want to feel today?</h3>
                    <div class="options-grid">
                        <label class="option-card">
                            <input type="radio" name="q1" value="Action">
                            <div class="option-content">
                                <h4>I want my heart racing</h4>
                                <p>Action / Thriller</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q1" value="Comedy">
                            <div class="option-content">
                                <h4>I just want to laugh</h4>
                                <p>Comedy</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q1" value="Drama">
                            <div class="option-content">
                                <h4>I want to feel something</h4>
                                <p>Drama / Romance</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q1" value="Horror">
                            <div class="option-content">
                                <h4>I want to be terrified</h4>
                                <p>Horror</p>
                            </div>
                        </label>
                    </div>
                </div>
                
                <!-- Q2 -->
                <div class="question-block">
                    <h3 class="question-title">2. Where should the story take place?</h3>
                    <div class="options-grid">
                        <label class="option-card">
                            <input type="radio" name="q2" value="Sci-Fi">
                            <div class="option-content">
                                <h4>Take me to the future</h4>
                                <p>Sci-Fi / Space</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q2" value="Fantasy">
                            <div class="option-content">
                                <h4>A magical fantasy world</h4>
                                <p>Fantasy</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q2" value="Crime">
                            <div class="option-content">
                                <h4>The gritty underworld</h4>
                                <p>Crime / Mystery</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q2" value="Adventure">
                            <div class="option-content">
                                <h4>Anywhere, take me on a trip!</h4>
                                <p>Adventure</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Q3 -->
                <div class="question-block">
                    <h3 class="question-title">3. What kind of characters?</h3>
                    <div class="options-grid">
                        <label class="option-card">
                            <input type="radio" name="q3" value="Biography">
                            <div class="option-content">
                                <h4>Real people with true stories</h4>
                                <p>Biography / History</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q3" value="Family">
                            <div class="option-content">
                                <h4>Just wholesome characters</h4>
                                <p>Family / Animation</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q3" value="Mystery">
                            <div class="option-content">
                                <h4>Someone solving a mystery</h4>
                                <p>Mystery</p>
                            </div>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="q3" value="Music">
                            <div class="option-content">
                                <h4>Artists chasing their dreams</h4>
                                <p>Music</p>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="glow-btn">Find My Movies</button>
            </form>

            <div id="recommendations-container" hidden>
                <h3>Your Magic Matches</h3>
                <div class="recommendation-list" id="recommendation-list"></div>
                <button type="button" class="glow-btn reset-btn" id="reset-btn">Start Over</button>
            </div>
        </div>
    </main>

    <div class="modal-backdrop" id="auth-modal" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <button type="button" class="modal-close" data-auth-close aria-label="Close">&times;</button>
            <div class="modal-tabs" id="auth-modal-title">
                <button type="button" class="modal-tab" data-tab="login">Log in</button>
                <button type="button" class="modal-tab" data-tab="signup">Sign up</button>
            </div>
            <form id="login-form" class="auth-form" data-tab-panel="login" novalidate>
                <div class="field">
                    <label for="login-identifier">Username or email</label>
                    <input type="text" id="login-identifier" name="identifier" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit">Log in</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
            <form id="signup-form" class="auth-form" data-tab-panel="signup" novalidate hidden>
                <div class="field">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" name="username" minlength="3" maxlength="50" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" minlength="6" autocomplete="new-password" required>
                </div>
                <button type="submit">Create account</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <script src="js/auth.js?v=3"></script>
    <script src="js/foryou_v2.js?v=3"></script>
</body>
</html>
