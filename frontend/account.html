<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CineRate — Account Settings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <a href="index.html" class="brand-link">
                <h1>CineRate</h1>
            </a>
            <span class="brand-dots" aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
            <p class="tagline">Movie ratings &amp; reviews</p>
        </div>
        <nav class="primary-nav">
            <a href="index.html">Home</a>
            <a href="leaderboard.html">Top 10</a>
            <a href="mywatchlist.html" data-auth-user hidden>Watchlist</a>
        </nav>
        <div class="auth-widget" id="auth-widget">
            <div class="auth-anon" data-auth-anon>
                <button type="button" class="auth-link" data-auth-open="login">Log in</button>
                <button type="button" class="auth-link auth-link-primary" data-auth-open="signup">Sign up</button>
            </div>
            <div class="auth-user" data-auth-user hidden>
                <a href="account.html" class="auth-username-link"><span class="auth-username">@<span data-auth-username></span></span></a>
                <button type="button" class="auth-link" data-auth-logout>Logout</button>
            </div>
        </div>
    </header>

    <main>
        <!-- Gate for unauthenticated users -->
        <div id="account-gate" data-auth-anon hidden>
            <section class="account-gate-section">
                <h2>Account Settings</h2>
                <p class="auth-gate">
                    <button type="button" class="auth-inline" data-auth-open="login">Log in</button>
                    or
                    <button type="button" class="auth-inline" data-auth-open="signup">sign up</button>
                    to access your account settings.
                </p>
            </section>
        </div>

        <!-- Account settings for authenticated users -->
        <div id="account-settings" data-auth-user hidden>
            <section class="account-section">
                <h2>Account Settings</h2>
                <p class="account-greeting">Manage your account details below, <strong data-auth-username></strong>.</p>
            </section>

            <!-- User info display -->
            <section class="account-section account-info-card" id="account-info-card">
                <div class="account-info-row">
                    <span class="account-info-label">Username</span>
                    <span class="account-info-value" id="account-username">—</span>
                </div>
                <div class="account-info-row">
                    <span class="account-info-label">Email</span>
                    <span class="account-info-value" id="account-email">—</span>
                </div>
            </section>

            <!-- Update Email -->
            <section class="account-section">
                <h3 class="account-form-title">Update Email</h3>
                <form id="update-email-form" class="account-form" novalidate>
                    <div class="field">
                        <label for="new-email">New email address</label>
                        <input type="email" id="new-email" name="new_email" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label for="email-confirm-password">Current password</label>
                        <input type="password" id="email-confirm-password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit">Update Email</button>
                    <p id="email-status" class="form-status" role="status" aria-live="polite"></p>
                </form>
            </section>

            <!-- Change Password -->
            <section class="account-section">
                <h3 class="account-form-title">Change Password</h3>
                <form id="change-password-form" class="account-form" novalidate>
                    <div class="field">
                        <label for="current-password">Current password</label>
                        <input type="password" id="current-password" name="current_password" autocomplete="current-password" required>
                    </div>
                    <div class="field">
                        <label for="new-password">New password</label>
                        <input type="password" id="new-password" name="new_password" minlength="6" autocomplete="new-password" required>
                    </div>
                    <div class="field">
                        <label for="confirm-password">Confirm new password</label>
                        <input type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required>
                    </div>
                    <button type="submit">Change Password</button>
                    <p id="password-status" class="form-status" role="status" aria-live="polite"></p>
                </form>
            </section>
        </div>
    </main>

    <div class="modal-backdrop" id="auth-modal" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <button type="button" class="modal-close" data-auth-close aria-label="Close">&times;</button>
            <div class="modal-tabs" id="auth-modal-title">
                <button type="button" class="modal-tab" data-tab="login">Log in</button>
                <button type="button" class="modal-tab" data-tab="signup">Sign up</button>
            </div>
            <form id="login-form" class="auth-form" data-tab-panel="login" novalidate>
                <div class="field">
                    <label for="login-identifier">Username or email</label>
                    <input type="text" id="login-identifier" name="identifier" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit">Log in</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
            <form id="signup-form" class="auth-form" data-tab-panel="signup" novalidate hidden>
                <div class="field">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" name="username" minlength="3" maxlength="50" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" minlength="6" autocomplete="new-password" required>
                </div>
                <button type="submit">Create account</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
