<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CineRate — Movie</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <a href="index.html" class="brand-link">
                <h1>CineRate</h1>
            </a>
            <span class="brand-dots" aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
            <p class="tagline">Movie ratings &amp; reviews</p>
        </div>
        <nav class="primary-nav">
            <a href="index.html">Home</a>
            <a href="leaderboard.html">Top 10</a>
            <a href="mywatchlist.html" data-auth-user hidden>Watchlist</a>
            <a href="foryou.html">For You</a>
        </nav>
        <div class="auth-widget" id="auth-widget">
            <div class="auth-anon" data-auth-anon>
                <button type="button" class="auth-link" data-auth-open="login">Log in</button>
                <button type="button" class="auth-link auth-link-primary" data-auth-open="signup">Sign up</button>
            </div>
            <div class="auth-user" data-auth-user hidden>
                <button type="button" class="auth-username-link" data-open-settings><span class="auth-username">@<span data-auth-username></span></span></button>
                <button type="button" class="auth-link" data-auth-logout>Logout</button>
            </div>
        </div>
    </header>

    <main>
        <p id="movie-status" class="movie-status">Loading…</p>

        <article id="movie-detail" class="movie-detail" hidden>
            <div class="movie-poster" id="movie-poster"></div>

            <div class="movie-info">
                <h2 class="movie-title" id="movie-title"></h2>
                <p class="movie-meta" id="movie-meta"></p>
                <div id="movie-genres" class="genre-list"></div>

                <div class="movie-rating-summary">
                    <span class="stars" id="movie-avg-stars"><span class="stars-fill"></span></span>
                    <span class="rating-caption" id="movie-avg-caption"></span>
                </div>

                <p class="movie-synopsis" id="movie-synopsis"></p>

                <div class="movie-actions">
                    <button type="button" id="watchlist-btn" class="watchlist-btn" hidden>
                        <span class="watchlist-label">Add to Watchlist</span>
                    </button>
                    <p class="auth-gate" data-auth-anon hidden>
                        <button type="button" class="auth-inline" data-auth-open="login">Log in</button>
                        to rate or save this movie.
                    </p>
                </div>

                <section id="reviews-section" class="reviews-section">
                    <h3>Reviews</h3>
                    <ul id="reviews-list" class="reviews-list"></ul>
                </section>

                <section id="rate-section" class="rate-section" data-auth-user hidden>
                    <h3>Your rating</h3>
                    <form id="rate-form" novalidate>
                        <div class="field rating-field">
                            <div class="rating-input-half" id="rating-input">
                                <div class="rating-stars-bg" aria-hidden="true">
                                    <span class="stars rating-stars-display"><span class="stars-fill" id="rating-stars-fill"></span></span>
                                </div>
                                <div class="rating-hitzones" id="rating-hitzones"></div>
                            </div>
                            <div class="rating-controls">
                                <span class="rating-current" id="rating-current">No rating</span>
                                <button type="button" class="rating-clear" id="rating-clear">Clear</button>
                            </div>
                            <input type="hidden" id="review-rating" name="rating">
                        </div>

                        <div class="field">
                            <label for="review-text">Review (optional)</label>
                            <textarea id="review-text" name="review_text" rows="4" placeholder="Optional"></textarea>
                        </div>

                        <button type="submit">Submit rating</button>
                        <p id="rate-status" class="form-status" role="status" aria-live="polite"></p>
                    </form>
                </section>
            </div>
        </article>
    </main>

    <div class="modal-backdrop" id="auth-modal" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <button type="button" class="modal-close" data-auth-close aria-label="Close">&times;</button>
            <div class="modal-tabs" id="auth-modal-title">
                <button type="button" class="modal-tab" data-tab="login">Log in</button>
                <button type="button" class="modal-tab" data-tab="signup">Sign up</button>
            </div>
            <form id="login-form" class="auth-form" data-tab-panel="login" novalidate>
                <div class="field">
                    <label for="login-identifier">Username or email</label>
                    <input type="text" id="login-identifier" name="identifier" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit">Log in</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
            <form id="signup-form" class="auth-form" data-tab-panel="signup" novalidate hidden>
                <div class="field">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" name="username" minlength="3" maxlength="50" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" minlength="6" autocomplete="new-password" required>
                </div>
                <button type="submit">Create account</button>
                <p class="form-status" data-status role="status" aria-live="polite"></p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/movie_v2.js"></script>
</body>
</html>
